<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" role="img" aria-labelledby="title desc"><title id="title">Biogas Digester — 18th Century Natural Philosophy Plate</title><desc id="desc">Sectional engraving of an anaerobic biogas digester showing: organic waste input, sealed digestion tank, gas pipe, gas storage balloon, and residue outlet — with cross-hatching and Latin annotations in period style.</desc><defs><pattern id="hatch-dense" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(40)"><line x1="0" y1="0" x2="0" y2="4" stroke="#3E2723" stroke-width="0.5" opacity="0.25"/></pattern><pattern id="hatch-light" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(-30)"><line x1="0" y1="0" x2="0" y2="5" stroke="#3E2723" stroke-width="0.4" opacity="0.18"/></pattern><pattern id="hatch-slurry" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(15)"><line x1="0" y1="0" x2="0" y2="6" stroke="#3E2723" stroke-width="0.3" opacity="0.12"/><circle cx="3" cy="3" r="0.5" fill="#3E2723" opacity="0.15"/></pattern><pattern id="stipple" width="6" height="6" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="0.4" fill="#3E2723" opacity="0.2"/><circle cx="4" cy="3" r="0.3" fill="#3E2723" opacity="0.15"/></pattern></defs><style>
@keyframes flow { 0% { stroke-dashoffset: 24; } 100% { stroke-dashoffset: 0; }
}
@keyframes spin { 0% { transform: rotate(0deg); transform-origin: center; } 100% { transform: rotate(360deg); transform-origin: center; }
}
@keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; }
}
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); }
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; }
}
@keyframes dash { 0% { stroke-dashoffset: 100; } 100% { stroke-dashoffset: 0; }
}
@keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); }
}
.animate-flow { animation: flow 2s linear infinite; }
.animate-flow-reverse { animation: flow 2s linear infinite; animation-direction: reverse; }
.animate-spin { animation: spin 4s linear infinite; }
.animate-spin-slow { animation: spin 8s linear infinite; }
.animate-pulse { animation: pulse 2s ease-in-out infinite; }
.animate-pulse-fast { animation: pulse 1s ease-in-out infinite; }
.animate-float { animation: float 3s ease-in-out infinite; }
.animate-blink { animation: blink 1.5s step-end infinite; }
.animate-dash { animation: dash 1.5s linear infinite; stroke-dasharray: 10 6; }
.animate-breathe { animation: breathe 4s ease-in-out infinite; transform-origin: center; }
</style><rect width="720" height="480" fill="#EDE0C8"/><rect x="18" y="18" width="684" height="444" fill="none" stroke="#3E2723" stroke-width="0.8"/><rect x="22" y="22" width="676" height="436" fill="none" stroke="#3E2723" stroke-width="0.4"/><path d="M 18 18 L 28 18 L 18 28 Z M 702 18 L 692 18 L 702 28 Z M 18 462 L 28 462 L 18 452 Z M 702 462 L 692 462 L 702 452 Z" fill="#3E2723" opacity="0.5"/><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723"><text x="360" y="56" font-size="17" font-weight="bold" text-anchor="middle" letter-spacing="1">FIG. VI. — Apparatus ad Biogas e Culinis</text><text x="360" y="76" font-size="13" font-style="italic" text-anchor="middle">Digester anaerobicus: materia organica in methanum convertitur</text></g><!-- Digester tank body --><g fill="none" stroke="#3E2723" stroke-width="1.8"><path d="M 220 140 L 220 380 Q 220 400 240 400 L 480 400 Q 500 400 500 380 L 500 140" fill="url(#hatch-light)"/><path d="M 220 140 L 220 180 L 500 180 L 500 140" fill="url(#hatch-dense)"/></g><!-- Slurry inside --><path d="M 221 340 L 499 340" stroke="#3E2723" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.5"/><path d="M 221 360 L 499 360" stroke="#3E2723" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.5"/><path d="M 222 380 L 498 380" stroke="#3E2723" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.5"/><rect x="222" y="340" width="277" height="58" fill="url(#hatch-slurry)" stroke="none"/><!-- Gas space label inside tank --><text x="360" y="240" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-style="italic" fill="#3E2723" text-anchor="middle">Methanum gas</text><text x="360" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#3E2723" text-anchor="middle" opacity="0.6">• • • • • • • • • •</text><!-- Input funnel on top --><g fill="none" stroke="#3E2723" stroke-width="1.5"><path d="M 340 80 L 320 140 L 400 140 L 380 80 Z" fill="white"/><rect x="335" y="75" width="50" height="10" rx="2" fill="white" stroke-width="1"/><text x="360" y="115" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#3E2723" text-anchor="middle">Materia organica</text></g><!-- Organic waste chunks in funnel --><circle cx="345" cy="100" r="4" fill="#3E2723" opacity="0.3"/><circle cx="355" cy="95" r="3" fill="#3E2723" opacity="0.25"/><circle cx="368" cy="102" r="3.5" fill="#3E2723" opacity="0.3"/><circle cx="360" cy="125" r="3" fill="#3E2723" opacity="0.2"/><!-- Gas outlet pipe --><g fill="none" stroke="#3E2723" stroke-width="1.2"><path d="M 470 160 L 530 160 L 530 120"/><rect x="522" y="115" width="16" height="10" rx="2" fill="white" stroke-width="0.8"/></g><!-- Gas storage balloon --><g fill="none" stroke="#3E2723" stroke-width="1.2"><path d="M 570 120 Q 570 60 620 50 Q 670 40 680 70 Q 690 100 660 120 Q 630 130 570 120 Z" fill="white"/><path d="M 570 120 Q 570 60 620 50 Q 670 40 680 70 Q 690 100 660 120 Q 630 130 570 120 Z" fill="url(#stipple)"/><path d="M 590 90 L 650 80" stroke-width="0.4" opacity="0.3"/><path d="M 600 100 L 660 90" stroke-width="0.4" opacity="0.3"/><!-- Tie knot --><circle cx="570" cy="120" r="4" fill="#3E2723"/><text x="625" y="65" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#3E2723" text-anchor="middle">Folliculus gas</text></g><!-- Output pipe for residue --><g fill="none" stroke="#3E2723" stroke-width="1.2"><path d="M 300 395 L 300 430 L 250 440"/><rect x="295" y="425" width="10" height="10" rx="2" fill="white" stroke-width="0.8"/></g><!-- Label leader lines --><g fill="none" stroke="#3E2723" stroke-width="0.5" stroke-dasharray="2 3"><line x1="340" y1="88" x2="280" y2="88"/><line x1="470" y1="165" x2="540" y2="165"/><line x1="660" y1="115" x2="690" y2="145"/><line x1="300" y1="397" x2="200" y2="420"/></g><!-- Labels --><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723" font-size="11" font-style="italic"><text x="272" y="86" text-anchor="end">Infundibulum</text><text x="548" y="163" text-anchor="start">Tubus gas</text><text x="698" y="145" text-anchor="start">Collectio</text><text x="192" y="418" text-anchor="end">Effluvium</text></g><!-- Title inside tank --><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723"><text x="360" y="370" font-size="11" font-style="italic" text-anchor="middle">Digestorium (materies organica + aqua)</text></g><!-- Ground line --><line x1="180" y1="440" x2="560" y2="440" stroke="#3E2723" stroke-width="0.8"/><path d="M 180 442 L 560 442" stroke="#3E2723" stroke-width="0.3" opacity="0.5"/><text x="360" y="460" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#3E2723" text-anchor="middle">Solum · Ground level</text></svg>
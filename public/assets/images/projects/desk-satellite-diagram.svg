<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc"><title id="title">Desk Satellite — Circuit Sculpture Plate</title><desc id="desc">Anatomical engraving of a desk satellite model showing solar panels (wings), ESP32-C3 microcontroller (brain), TFT LCD display (face), SHT31 sensor (nose), touch module (hand), 16340 battery (heart), TP4056 charger, copper wire frame (skeleton), and copper tube stand — with cross-hatching and leader labels in period style.</desc><defs><pattern id="hatch-dense" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(40)"><line x1="0" y1="0" x2="0" y2="4" stroke="#3E2723" stroke-width="0.5" opacity="0.25"/></pattern><pattern id="hatch-light" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(-30)"><line x1="0" y1="0" x2="0" y2="5" stroke="#3E2723" stroke-width="0.4" opacity="0.18"/></pattern><pattern id="hatch-cross" width="6" height="6" patternUnits="userSpaceOnUse"><path d="M 0 0 L 6 6 M 6 0 L 0 6" stroke="#3E2723" stroke-width="0.3" opacity="0.12"/></pattern><pattern id="hatch-grid" width="3" height="3" patternUnits="userSpaceOnUse"><rect width="3" height="3" fill="none" stroke="#3E2723" stroke-width="0.2" opacity="0.10"/></pattern><linearGradient id="panel-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#D4C5A0"/><stop offset="100%" stop-color="#EDE0C8"/></linearGradient></defs><style>
@keyframes flow { 0% { stroke-dashoffset: 24; } 100% { stroke-dashoffset: 0; }
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); }
}
@keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; }
}
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); }
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; }
}
@keyframes dash { 0% { stroke-dashoffset: 100; } 100% { stroke-dashoffset: 0; }
}
@keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); }
}
.animate-flow { animation: flow 2s linear infinite; }
.animate-flow-reverse { animation: flow 2s linear infinite; animation-direction: reverse; }
.animate-pulse { animation: pulse 2s ease-in-out infinite; }
.animate-pulse-fast { animation: pulse 1s ease-in-out infinite; }
.animate-float { animation: float 3s ease-in-out infinite; }
.animate-blink { animation: blink 1.5s step-end infinite; }
.animate-dash { animation: dash 1.5s linear infinite; stroke-dasharray: 10 6; }
.animate-breathe { animation: breathe 4s ease-in-out infinite; }
</style><rect width="720" height="520" fill="#EDE0C8"/><rect x="18" y="18" width="684" height="484" fill="none" stroke="#3E2723" stroke-width="0.8"/><rect x="22" y="22" width="676" height="476" fill="none" stroke="#3E2723" stroke-width="0.4"/><path d="M 18 18 L 28 18 L 18 28 Z M 702 18 L 692 18 L 702 28 Z M 18 502 L 28 502 L 18 492 Z M 702 502 L 692 502 L 702 492 Z" fill="#3E2723" opacity="0.5"/><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723"><text x="360" y="56" font-size="17" font-weight="bold" text-anchor="middle" letter-spacing="1">FIG. V. — Anatomy of the Desk Satellite</text><text x="360" y="78" font-size="13" font-style="italic" text-anchor="middle">Elevatio et sectio: corpus, alae solares, cerebrum, et organa sensuum</text></g><!-- Copper tube stand --><g fill="none" stroke="#8B6914" stroke-width="1.2"><path d="M 340 440 L 340 485" stroke-width="2.5"/><path d="M 340 485 L 310 500" stroke-width="2"/><path d="M 340 485 L 370 500" stroke-width="2"/><circle cx="340" cy="440" r="4" fill="#8B6914" stroke="none"/></g><text x="340" y="510" font-family="Georgia, 'Times New Roman', serif" font-size="9" font-style="italic" fill="#3E2723" text-anchor="middle">Culmus cupreus (basis)</text><!-- Satellite main body (copper wire frame, hexagon) --><g fill="#3E2723" stroke="#3E2723"><!-- Body frame - faceted hexagonal --><polygon points="280,200 400,200 430,300 400,400 280,400 250,300" fill="url(#hatch-light)" stroke-width="2.5" stroke-linejoin="round"/><!-- Internal shelf line --><line x1="260" y1="320" x2="420" y2="320" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/><!-- Bottom section fill --><polygon points="280,320 400,320 400,400 280,400" fill="url(#hatch-cross)" stroke="none"/></g><!-- Solar panels (wings) - left --><g fill="url(#panel-grad)" stroke="#3E2723" stroke-width="1.5"><polygon points="250,200 120,140 110,200 250,240" fill="url(#hatch-grid)"/><!-- Solar cell grid lines --><line x1="180" y1="165" x2="180" y2="225" stroke="#3E2723" stroke-width="0.3" opacity="0.4"/><line x1="150" y1="178" x2="230" y2="215" stroke="#3E2723" stroke-width="0.3" opacity="0.4"/><line x1="120" y1="140" x2="110" y2="200" stroke="#3E2723" stroke-width="0.8"/></g><!-- Solar panels (wings) - right --><g fill="url(#panel-grad)" stroke="#3E2723" stroke-width="1.5"><polygon points="430,200 600,140 610,200 430,240" fill="url(#hatch-grid)"/><line x1="540" y1="165" x2="540" y2="225" stroke="#3E2723" stroke-width="0.3" opacity="0.4"/><line x1="570" y1="178" x2="490" y2="215" stroke="#3E2723" stroke-width="0.3" opacity="0.4"/><line x1="600" y1="140" x2="610" y2="200" stroke="#3E2723" stroke-width="0.8"/></g><!-- Antenna --><g fill="none" stroke="#8B6914" stroke-width="1"><line x1="340" y1="200" x2="340" y2="110" stroke-width="1.5"/><line x1="340" y1="110" x2="320" y2="90" stroke-width="1"/><line x1="340" y1="110" x2="360" y2="90" stroke-width="1"/><circle cx="320" cy="90" r="3" fill="#8B6914"/><circle cx="360" cy="90" r="3" fill="#8B6914"/></g><!-- Battery (heart) --><g fill="none" stroke="#3E2723" stroke-width="1.5"><rect x="320" y="325" width="40" height="60" rx="3" fill="url(#hatch-dense)"/><line x1="330" y1="332" x2="330" y2="378" stroke-width="0.5" opacity="0.3"/><line x1="340" y1="332" x2="340" y2="378" stroke-width="0.5" opacity="0.3"/><line x1="350" y1="332" x2="350" y2="378" stroke-width="0.5" opacity="0.3"/><text x="340" y="360" font-family="Georgia, 'Times New Roman', serif" font-size="6" fill="#3E2723" text-anchor="middle">16340</text><rect x="325" y="322" width="30" height="6" rx="2" fill="none" stroke-width="1"/><line x1="335" y1="322" x2="335" y2="328" stroke-width="0.8"/><line x1="345" y1="322" x2="345" y2="328" stroke-width="0.8"/></g><!-- ESP32-C3 on top shelf (brain) --><g fill="none" stroke="#3E2723" stroke-width="1.2"><rect x="305" y="225" width="70" height="50" rx="2" fill="white"/><rect x="310" y="230" width="60" height="30" rx="1" fill="url(#hatch-light)"/><!-- Chip symbol --><rect x="330" y="240" width="20" height="10" rx="1" fill="#3E2723" opacity="0.6"/><!-- Pin legs --><line x1="310" y1="235" x2="305" y2="235" stroke-width="0.6"/><line x1="310" y1="240" x2="305" y2="240" stroke-width="0.6"/><line x1="310" y1="245" x2="305" y2="245" stroke-width="0.6"/><line x1="375" y1="235" x2="380" y2="235" stroke-width="0.6"/><line x1="375" y1="240" x2="380" y2="240" stroke-width="0.6"/><line x1="375" y1="245" x2="380" y2="245" stroke-width="0.6"/><!-- USB port --><rect x="325" y="260" width="30" height="8" rx="1" fill="none" stroke-width="0.8"/></g><!-- LCD Display (face) --><g fill="none" stroke="#3E2723" stroke-width="1.2"><rect x="312" y="128" width="56" height="40" rx="2" fill="white"/><rect x="316" y="132" width="48" height="30" rx="1" fill="#F5F0E0"/><!-- Screen content - miniature data display --><text x="340" y="145" font-family="Georgia, 'Times New Roman', serif" font-size="5" fill="#3E2723" text-anchor="middle" font-weight="bold">T: 24.6°C</text><text x="340" y="153" font-family="Georgia, 'Times New Roman', serif" font-size="5" fill="#3E2723" text-anchor="middle">H: 58%</text><line x1="320" y1="156" x2="360" y2="156" stroke-width="0.3" opacity="0.3"/><rect x="330" y="160" width="20" height="2" fill="#3E2723" opacity="0.3"/></g><!-- SHT31 sensor (nose) --><g fill="none" stroke="#3E2723" stroke-width="1"><rect x="330" y="268" width="20" height="14" rx="1" fill="white"/><circle cx="340" cy="275" r="3" fill="url(#hatch-dense)"/><text x="340" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="4" fill="#3E2723" text-anchor="middle">SHT31</text></g><!-- Touch module (hand) --><g fill="none" stroke="#3E2723" stroke-width="1"><rect x="306" y="290" width="14" height="18" rx="1" fill="white"/><circle cx="313" cy="299" r="3" fill="#3E2723" opacity="0.4"/></g><!-- Copper wire traces (connecting lines) --><g fill="none" stroke="#8B6914" stroke-width="0.8" stroke-linejoin="round"><!-- Solar panel to ESP32 --><path d="M 250 220 L 280 220 L 280 250 L 305 250"/><path d="M 430 220 L 400 220 L 400 250 L 380 250"/><!-- ESP32 to LCD --><path d="M 320 225 L 320 168 L 312 168"/><path d="M 360 225 L 360 168 L 368 168"/><!-- ESP32 to SHT31 --><path d="M 335 250 L 335 268"/><path d="M 345 250 L 345 268"/><!-- ESP32 to battery --><path d="M 330 275 L 330 325"/><path d="M 350 275 L 350 325"/><!-- Touch module --><path d="M 313 290 L 313 282 L 320 282 L 320 275"/><!-- Antenna to ESP32 --><path d="M 340 200 L 340 225"/></g><!-- Labels --><g fill="none" stroke="#3E2723" stroke-width="0.5" stroke-dasharray="2 3"><!-- Solar panel labels --><line x1="130" y1="160" x2="80" y2="130"/><line x1="590" y1="160" x2="640" y2="130"/><!-- LCD label --><line x1="370" y1="148" x2="410" y2="115"/><!-- Antenna label --><line x1="355" y1="100" x2="400" y2="100"/><!-- ESP32 label --><line x1="370" y1="240" x2="440" y2="240"/><!-- SHT31 label --><line x1="355" y1="275" x2="440" y2="280"/><!-- Battery label --><line x1="365" y1="355" x2="440" y2="350"/><!-- Touch label --><line x1="300" y1="299" x2="240" y2="299"/><!-- Copper wire label --><line x1="260" y1="395" x2="200" y2="420"/></g><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723" font-size="10" font-style="italic"><text x="72" y="128" text-anchor="end">Ala solaris</text><text x="648" y="128" text-anchor="start">Ala solaris</text><text x="415" y="113" text-anchor="start">Facies (TFT LCD)</text><text x="408" y="98" text-anchor="start">Antenna</text><text x="448" y="238" text-anchor="start">Cerebrum (ESP32-C3)</text><text x="448" y="278" text-anchor="start">Nasus (SHT31)</text><text x="448" y="348" text-anchor="start">Cor (16340)</text><text x="232" y="297" text-anchor="end">Digitus (TTP223)</text><text x="192" y="418" text-anchor="end">Filum cupreum</text></g><!-- Callout: battery detail --><g fill="#3E2723" stroke="#3E2723" stroke-width="0.5"><rect x="470" y="370" width="180" height="95" rx="3" fill="#F5F0E0" stroke-width="0.8"/><text x="560" y="388" font-family="Georgia, 'Times New Roman', serif" font-size="9" font-weight="bold" text-anchor="middle">Detail A — Skeleton et Vincula</text><text x="560" y="403" font-family="Georgia, 'Times New Roman', serif" font-size="8" font-style="italic" text-anchor="middle">Copper wire as both frame and circuit path</text><g fill="none" stroke="#8B6914" stroke-width="1.2"><line x1="490" y1="415" x2="540" y2="415"/><line x1="490" y1="425" x2="540" y2="425"/><line x1="490" y1="435" x2="540" y2="435"/><line x1="490" y1="445" x2="540" y2="445"/><line x1="490" y1="455" x2="540" y2="455"/></g><text x="550" y="418" font-family="Georgia, 'Times New Roman', serif" font-size="7" fill="#3E2723">1. Filum aeneum 1mm</text><text x="550" y="428" font-family="Georgia, 'Times New Roman', serif" font-size="7" fill="#3E2723">2. Structura corporea</text><text x="550" y="438" font-family="Georgia, 'Times New Roman', serif" font-size="7" fill="#3E2723">3. Via electrica</text><text x="550" y="448" font-family="Georgia, 'Times New Roman', serif" font-size="7" fill="#3E2723">4. Iuncturae stamina</text><text x="550" y="458" font-family="Georgia, 'Times New Roman', serif" font-size="7" fill="#3E2723">5. Fornax aeraria</text></g><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723" font-size="9" font-style="italic"><text x="360" y="470" text-anchor="middle">Published by the SciVid Society. Anno Domini MDCCCXXIV.</text></g></svg>
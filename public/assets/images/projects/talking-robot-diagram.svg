<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-labelledby="title desc"><title id="title">Talking Robot — 18th Century Automaton Plate</title><desc id="desc">Anatomical engraving of a speaking automaton showing IR sensor (eye), Arduino Nano (brain), DFPlayer Mini (voice box), speaker (mouth), SD card (memory), and cardboard body — with cross-hatching and leader labels in period style.</desc><defs><pattern id="hatch-dense" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(40)"><line x1="0" y1="0" x2="0" y2="4" stroke="#3E2723" stroke-width="0.5" opacity="0.25"/></pattern><pattern id="hatch-light" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(-30)"><line x1="0" y1="0" x2="0" y2="5" stroke="#3E2723" stroke-width="0.4" opacity="0.18"/></pattern><pattern id="hatch-cross" width="6" height="6" patternUnits="userSpaceOnUse"><path d="M 0 0 L 6 6 M 6 0 L 0 6" stroke="#3E2723" stroke-width="0.3" opacity="0.12"/></pattern></defs><style> @keyframes flow { 0% { stroke-dashoffset: 24; } 100% { stroke-dashoffset: 0; } } @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } } @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } } @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } } @keyframes dash { 0% { stroke-dashoffset: 100; } 100% { stroke-dashoffset: 0; } } @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } } .animate-flow { animation: flow 2s linear infinite; } .animate-flow-reverse { animation: flow 2s linear infinite; animation-direction: reverse; } .animate-pulse { animation: pulse 2s ease-in-out infinite; } .animate-pulse-fast { animation: pulse 1s ease-in-out infinite; } .animate-float { animation: float 3s ease-in-out infinite; } .animate-blink { animation: blink 1.5s step-end infinite; } .animate-dash { animation: dash 1.5s linear infinite; stroke-dasharray: 10 6; } .animate-breathe { animation: breathe 4s ease-in-out infinite; } </style><rect width="720" height="460" fill="#EDE0C8"/><rect x="18" y="18" width="684" height="424" fill="none" stroke="#3E2723" stroke-width="0.8"/><rect x="22" y="22" width="676" height="416" fill="none" stroke="#3E2723" stroke-width="0.4"/><path d="M 18 18 L 28 18 L 18 28 Z M 702 18 L 692 18 L 702 28 Z M 18 442 L 28 442 L 18 432 Z M 702 442 L 692 442 L 702 432 Z" fill="#3E2723" opacity="0.5"/><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723"><text x="360" y="54" font-size="17" font-weight="bold" text-anchor="middle" letter-spacing="1">FIG. IV. — Mechanical Anatomy of the Speaking Automaton</text><text x="360" y="76" font-size="13" font-style="italic" text-anchor="middle">Sectional view: sensor, controller, voice module, transducer, and housing</text></g><g fill="#3E2723" stroke="#3E2723"><ellipse cx="340" cy="380" rx="140" ry="35" fill="url(#hatch-dense)" stroke-width="2.5"/><path d="M 200 380 L 200 230 Q 200 140 340 140 Q 480 140 480 230 L 480 380" fill="url(#hatch-light)" stroke-width="2.5" stroke-linejoin="round"/><path d="M 200 230 Q 200 160 340 160 Q 480 160 480 230" fill="url(#hatch-cross)" stroke="none"/><ellipse cx="340" cy="140" rx="60" ry="18" fill="url(#hatch-dense)" stroke-width="2"/><path d="M 280 140 Q 280 110 340 108 Q 400 110 400 140" fill="url(#hatch-light)" stroke-width="1.5"/></g><g fill="none" stroke="#3E2723" stroke-width="0.5"><line x1="210" y1="230" x2="470" y2="230"/><line x1="210" y1="290" x2="470" y2="290"/><line x1="210" y1="340" x2="470" y2="340"/></g><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723"><circle cx="340" cy="120" r="14" fill="white" stroke-width="2"/><circle cx="340" cy="120" r="7" fill="#3E2723"/><text x="340" y="255" font-size="10" font-style="italic" text-anchor="middle">Cerebrum (Arduino)</text><text x="340" y="305" font-size="10" font-style="italic" text-anchor="middle">Vocalis (DFPlayer)</text><text x="340" y="360" font-size="10" font-style="italic" text-anchor="middle">Amplificatio (Speaker)</text></g><g fill="none" stroke="#3E2723" stroke-width="0.5" stroke-dasharray="2 3"><line x1="325" y1="245" x2="250" y2="245"/><line x1="325" y1="295" x2="250" y2="295"/><line x1="325" y1="350" x2="250" y2="350"/></g><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723" font-size="11" font-style="italic"><text x="245" y="242" text-anchor="end">ATmega328P</text><text x="245" y="292" text-anchor="end">DFPlayer Mini</text><text x="245" y="347" text-anchor="end">8 Ω transducer</text></g><g fill="none" stroke="#3E2723" stroke-width="1.5"><line x1="310" y1="255" x2="285" y2="225" stroke-width="0.6"/><line x1="285" y1="225" x2="200" y2="180" stroke-width="0.6"/><circle cx="200" cy="180" r="6" fill="white" stroke-width="1.2"/></g><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723"><text x="195" y="175" font-size="11" font-style="italic" text-anchor="end">Oculus (IR)</text><text x="195" y="200" font-size="10" font-style="italic" text-anchor="end">sensu praesentiae</text></g><g fill="none" stroke="#3E2723" stroke-width="1.5"><line x1="370" y1="305" x2="480" y2="305"/><rect x="480" y="290" width="44" height="30" rx="3" fill="white" stroke-width="1.2"/></g><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723"><text x="532" y="305" font-size="11" font-style="italic">Memoria (Micro SD)</text><text x="532" y="322" font-size="10" font-style="italic">.wav / .mp3</text></g><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723" font-size="11" font-style="italic"><text x="340" y="415" text-anchor="middle">Corpus ex charta · Body constructed of cardboard</text></g><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723" font-size="11"><text x="360" y="448" text-anchor="middle" font-style="italic">Automaton after Vaucanson · A.D. MDCCL</text></g></svg>
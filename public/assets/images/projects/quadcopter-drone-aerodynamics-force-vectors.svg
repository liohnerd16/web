<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc"><title id="title">Quadcopter Force Diagram — 18th Century Engineering Style</title><desc id="desc">Period-style engraving of a quadcopter in flight with upward thrust from all four motors, lift and weight vectors, labelled in serif type.</desc><defs><pattern id="hatch-dense" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="4" stroke="#3E2723" stroke-width="0.5" opacity="0.3"/></pattern><pattern id="hatch-light" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(-35)"><line x1="0" y1="0" x2="0" y2="5" stroke="#3E2723" stroke-width="0.4" opacity="0.2"/></pattern><pattern id="stipple" width="6" height="6" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="0.4" fill="#3E2723" opacity="0.2"/><circle cx="4" cy="3" r="0.3" fill="#3E2723" opacity="0.15"/></pattern><marker id="arrow-up" markerWidth="14" markerHeight="10" refX="7" refY="10" orient="auto"><path d="M 0 0 L 7 10 L 14 0 Q 7 3 0 0" fill="#3E2723" stroke="none"/></marker><marker id="arrow-down" markerWidth="14" markerHeight="10" refX="7" refY="0" orient="auto"><path d="M 0 10 L 7 0 L 14 10 Q 7 7 0 10" fill="#3E2723" stroke="none"/></marker></defs><style> @keyframes flow { 0% { stroke-dashoffset: 24; } 100% { stroke-dashoffset: 0; } } @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } } @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } } @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } } @keyframes dash { 0% { stroke-dashoffset: 100; } 100% { stroke-dashoffset: 0; } } @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } } .animate-flow { animation: flow 2s linear infinite; } .animate-flow-reverse { animation: flow 2s linear infinite; animation-direction: reverse; } .animate-pulse { animation: pulse 2s ease-in-out infinite; } .animate-pulse-fast { animation: pulse 1s ease-in-out infinite; } .animate-float { animation: float 3s ease-in-out infinite; } .animate-blink { animation: blink 1.5s step-end infinite; } .animate-dash { animation: dash 1.5s linear infinite; stroke-dasharray: 10 6; } .animate-breathe { animation: breathe 4s ease-in-out infinite; } </style><rect width="720" height="520" fill="#EDE0C8"/><rect x="18" y="18" width="684" height="484" fill="none" stroke="#3E2723" stroke-width="0.8"/><rect x="22" y="22" width="676" height="476" fill="none" stroke="#3E2723" stroke-width="0.4"/><path d="M 18 18 L 28 18 L 18 28 Z M 702 18 L 692 18 L 702 28 Z M 18 502 L 28 502 L 18 492 Z M 702 502 L 692 502 L 702 492 Z" fill="#3E2723" opacity="0.5"/><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723"><text x="360" y="54" font-size="17" font-weight="bold" text-anchor="middle" letter-spacing="1">FIG. II. — Aerodynamic Forces Upon a Flying Quadcopter</text><text x="360" y="76" font-size="13" font-style="italic" text-anchor="middle">Showing lift, weight, and the upward thrust of each motor</text></g><g stroke="#3E2723" fill="none"><line x1="360" y1="280" x2="210" y2="175" stroke-width="2.5"/><line x1="360" y1="280" x2="510" y2="175" stroke-width="2.5"/><line x1="360" y1="280" x2="210" y2="385" stroke-width="2.5"/><line x1="360" y1="280" x2="510" y2="385" stroke-width="2.5"/></g><g fill="url(#stipple)" stroke="none"><rect x="310" y="230" width="100" height="100" rx="20" ry="20"/></g><rect x="310" y="230" width="100" height="100" rx="20" ry="20" fill="none" stroke="#3E2723" stroke-width="2.5"/><path d="M 315 235 L 405 235 L 405 325 L 315 325 Z" fill="none" stroke="#3E2723" stroke-width="0.4"/><path d="M 320 240 L 400 240 M 320 245 L 400 245 M 320 250 L 400 250 M 320 255 L 400 255 M 320 260 L 400 260 M 320 265 L 400 265 M 320 270 L 400 270 M 320 275 L 400 275" stroke="#3E2723" stroke-width="0.3" opacity="0.3"/><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723" font-size="12" text-anchor="middle"><text x="360" y="290" font-weight="bold" letter-spacing="1">FLIGHT</text><text x="360" y="306" font-style="italic" font-size="11">Controller</text></g><g fill="#3E2723" stroke="#3E2723"><circle cx="210" cy="175" r="22" fill="white" stroke-width="2"/><circle cx="210" cy="175" r="22" fill="url(#hatch-dense)" stroke="none"/><circle cx="210" cy="175" r="22" fill="none" stroke-width="2" class="animate-spin" style="transform-origin:210px 175px"/><text x="210" y="181" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#3E2723">M₁</text><circle cx="510" cy="175" r="22" fill="white" stroke-width="2" class="animate-spin" style="transform-origin:510px 175px"/><circle cx="510" cy="175" r="22" fill="url(#hatch-dense)" stroke="none" class="animate-spin" style="transform-origin:510px 175px"/><circle cx="510" cy="175" r="22" fill="none" stroke-width="2" class="animate-spin" style="transform-origin:510px 175px"/><text x="510" y="181" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#3E2723">M₂</text><circle cx="210" cy="385" r="22" fill="white" stroke-width="2" class="animate-spin" style="transform-origin:210px 385px"/><circle cx="210" cy="385" r="22" fill="url(#hatch-dense)" stroke="none" class="animate-spin" style="transform-origin:210px 385px"/><circle cx="210" cy="385" r="22" fill="none" stroke-width="2" class="animate-spin" style="transform-origin:210px 385px"/><text x="210" y="391" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#3E2723">M₃</text><circle cx="510" cy="385" r="22" fill="white" stroke-width="2" class="animate-spin" style="transform-origin:510px 385px"/><circle cx="510" cy="385" r="22" fill="url(#hatch-dense)" stroke="none" class="animate-spin" style="transform-origin:510px 385px"/><circle cx="510" cy="385" r="22" fill="none" stroke-width="2" class="animate-spin" style="transform-origin:510px 385px"/><text x="510" y="391" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#3E2723">M₄</text></g><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723" font-size="10" font-style="italic" text-anchor="middle"><text x="210" y="148" fill="#3E2723">CCW</text><text x="510" y="148" fill="#3E2723">CW</text><text x="210" y="418" fill="#3E2723">CW</text><text x="510" y="418" fill="#3E2723">CCW</text></g><g fill="none" stroke="#3E2723" stroke-width="2.5"><line x1="210" y1="145" x2="210" y2="75" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-up)" class="animate-flow"/><line x1="510" y1="145" x2="510" y2="75" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-up)" class="animate-flow"/><line x1="210" y1="415" x2="210" y2="345" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-up)" class="animate-flow"/><line x1="510" y1="415" x2="510" y2="345" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-up)" class="animate-flow"/></g><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723" font-size="12" font-style="italic" text-anchor="middle"><text x="210" y="68">Thrust</text><text x="510" y="68">Thrust</text><text x="210" y="338">Thrust</text><text x="510" y="338">Thrust</text></g><g fill="none" stroke="#3E2723" stroke-width="2.5"><line x1="360" y1="215" x2="360" y2="100" stroke-width="2.5" stroke-dasharray="8 4" marker-end="url(#arrow-up)" class="animate-flow"/><line x1="360" y1="345" x2="360" y2="470" stroke-width="2.5" stroke-dasharray="8 4" marker-end="url(#arrow-down)" class="animate-flow"/></g><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723"><text x="382" y="150" font-size="16" font-weight="bold" font-style="italic">LIFT</text><text x="382" y="470" font-size="16" font-weight="bold" font-style="italic">WEIGHT</text></g><rect x="540" y="390" width="155" height="100" rx="4" fill="none" stroke="#3E2723" stroke-width="0.8"/><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723" font-size="11"><text x="617" y="408" font-weight="bold" text-anchor="middle" letter-spacing="1">LEGEND</text><line x1="548" y1="422" x2="575" y2="422" stroke="#3E2723" stroke-width="2" stroke-dasharray="6 4"/><text x="582" y="426">Force vector</text><circle cx="561" cy="442" r="6" fill="none" stroke="#3E2723" stroke-width="1.5"/><text x="574" y="446">Motor (CW / CCW)</text><line x1="548" y1="462" x2="575" y2="462" stroke="#3E2723" stroke-width="2"/><text x="582" y="466">Arm / Structure</text><rect x="548" y="478" width="8" height="8" fill="url(#stipple)" stroke="#3E2723" stroke-width="0.5"/><text x="574" y="486">Shading / Cross-hatch</text></g><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723" font-size="11" font-style="italic"><text x="360" y="507" text-anchor="middle">All four rotors generate upward thrust · A.D. MDCCLXVI</text></g></svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" role="img" aria-labelledby="title desc"><title id="title">Cabbage pH Indicator — 18th Century Natural History Style</title><desc id="desc">Hand-coloured engraved plate showing the red cabbage pH scale from acid (red) through neutral (purple-blue) to base (green-yellow), with numbered pH values and Latin annotations.</desc><defs><pattern id="hatch-bar" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(20)"><line x1="0" y1="0" x2="0" y2="4" stroke="#3E2723" stroke-width="0.4" opacity="0.15"/></pattern><pattern id="stipple" width="5" height="5" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="0.3" fill="#3E2723" opacity="0.12"/><circle cx="3.5" cy="3.5" r="0.25" fill="#3E2723" opacity="0.1"/></pattern></defs><style>
@keyframes flow { 0% { stroke-dashoffset: 24; } 100% { stroke-dashoffset: 0; }
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); }
}
@keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; }
}
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); }
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; }
}
@keyframes dash { 0% { stroke-dashoffset: 100; } 100% { stroke-dashoffset: 0; }
}
@keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); }
}
.animate-flow { animation: flow 2s linear infinite; }
.animate-flow-reverse { animation: flow 2s linear infinite; animation-direction: reverse; }
.animate-pulse { animation: pulse 2s ease-in-out infinite; }
.animate-pulse-fast { animation: pulse 1s ease-in-out infinite; }
.animate-float { animation: float 3s ease-in-out infinite; }
.animate-blink { animation: blink 1.5s step-end infinite; }
.animate-dash { animation: dash 1.5s linear infinite; stroke-dasharray: 10 6; }
.animate-breathe { animation: breathe 4s ease-in-out infinite; }
</style><rect width="900" height="480" fill="#EDE0C8"/><rect x="18" y="18" width="864" height="444" fill="none" stroke="#3E2723" stroke-width="0.8"/><rect x="22" y="22" width="856" height="436" fill="none" stroke="#3E2723" stroke-width="0.4"/><path d="M 18 18 L 28 18 L 18 28 Z M 882 18 L 872 18 L 882 28 Z M 18 462 L 28 462 L 18 452 Z M 882 462 L 872 462 L 882 452 Z" fill="#3E2723" opacity="0.5"/><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723"><text x="450" y="54" font-size="18" font-weight="bold" text-anchor="middle" letter-spacing="1">FIG. III. — Scale of Red Cabbage Indicator</text><text x="450" y="78" font-size="14" font-style="italic" text-anchor="middle">Anthocyanin colour shift with acidity &amp; basicity · after nature</text></g><g transform="translate(60, 130)"><rect x="0" y="0" width="60" height="180" rx="6" fill="#A52A2A" opacity="0.85"/><rect x="60" y="0" width="60" height="180" rx="6" fill="#B22222" opacity="0.85"/><rect x="120" y="0" width="60" height="180" rx="6" fill="#CD5C5C" opacity="0.85"/><rect x="180" y="0" width="60" height="180" rx="6" fill="#C080B0" opacity="0.85"/><rect x="240" y="0" width="60" height="180" rx="6" fill="#9370DB" opacity="0.85"/><rect x="300" y="0" width="60" height="180" rx="6" fill="#7B68AE" opacity="0.85"/><rect x="360" y="0" width="60" height="180" rx="6" fill="#6A5ACD" opacity="0.85"/><rect x="420" y="0" width="60" height="180" rx="6" fill="#5B7EC8" opacity="0.85"/><rect x="480" y="0" width="60" height="180" rx="6" fill="#4A8BA8" opacity="0.85"/><rect x="540" y="0" width="60" height="180" rx="6" fill="#3B7D6A" opacity="0.85"/><rect x="600" y="0" width="60" height="180" rx="6" fill="#6B8E23" opacity="0.85"/><rect x="660" y="0" width="60" height="180" rx="6" fill="#B8860B" opacity="0.85"/><rect x="720" y="0" width="60" height="180" rx="6" fill="#DAA520" opacity="0.85"/><rect x="0" y="0" width="780" height="180" rx="6" fill="url(#hatch-bar)" stroke="none"/><rect x="0" y="0" width="780" height="180" rx="6" fill="none" stroke="#3E2723" stroke-width="1.2"/><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723" font-size="19" font-weight="bold" text-anchor="middle"><text x="30" y="210">1</text><text x="90" y="210">2</text><text x="150" y="210">3</text><text x="210" y="210">4</text><text x="270" y="210">5</text><text x="330" y="210">6</text><text x="390" y="210">7</text><text x="450" y="210">8</text><text x="510" y="210">9</text><text x="570" y="210">10</text><text x="630" y="210">11</text><text x="690" y="210">12</text><text x="750" y="210">13</text></g><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723" font-size="14" font-style="italic"><text x="30" y="240" text-anchor="middle">ruber</text><text x="90" y="240" text-anchor="middle">ruber</text><text x="150" y="240" text-anchor="middle">roseus</text><text x="210" y="240" text-anchor="middle">roseus</text><text x="270" y="240" text-anchor="middle">purpureus</text><text x="330" y="240" text-anchor="middle">purpureus</text><text x="390" y="240" text-anchor="middle">violaceus</text><text x="450" y="240" text-anchor="middle">caeruleus</text><text x="510" y="240" text-anchor="middle">caeruleus</text><text x="570" y="240" text-anchor="middle">viridis</text><text x="630" y="240" text-anchor="middle">viridis</text><text x="690" y="240" text-anchor="middle">flavus</text><text x="750" y="240" text-anchor="middle">flavus</text></g><line x1="0" y1="260" x2="780" y2="260" stroke="#3E2723" stroke-width="0.8"/><path d="M 0 262 L 780 262" stroke="#3E2723" stroke-width="0.4" opacity="0.5"/><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723" font-size="15" font-weight="bold"><text x="0" y="290" fill="#8B0000">ACIDA</text><text x="360" y="290" fill="#4A0080">NEUTRA</text><text x="650" y="290" fill="#5C4033">BASICA</text><line x1="0" y1="276" x2="60" y2="276" stroke="#8B0000" stroke-width="1.5"/><line x1="330" y1="276" x2="420" y2="276" stroke="#4A0080" stroke-width="1.5"/><line x1="620" y1="276" x2="770" y2="276" stroke="#5C4033" stroke-width="1.5"/></g></g><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723" font-size="13"><text x="60" y="420"><tspan font-style="italic">Nota bene:</tspan> Strong acids appear red; neutral solutions are violet-blue;</text><text x="60" y="440">strong bases shift toward green and then yellow. The colour is due to anthocyanin.</text></g></svg>
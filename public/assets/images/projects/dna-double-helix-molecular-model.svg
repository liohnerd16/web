<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-labelledby="title desc"><title id="title">DNA Double Helix — 18th Century Engraving Style</title><desc id="desc">Period-style engraving of the DNA double helix with labelled base pairs, cross-hatched strands, and decorative border.</desc><defs><pattern id="hatch-a" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(35)"><line x1="0" y1="0" x2="0" y2="5" stroke="#3E2723" stroke-width="0.6" opacity="0.3"/></pattern><pattern id="hatch-b" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(-35)"><line x1="0" y1="0" x2="0" y2="5" stroke="#3E2723" stroke-width="0.6" opacity="0.3"/></pattern><pattern id="stipple" width="6" height="6" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="0.5" fill="#3E2723" opacity="0.25"/><circle cx="4" cy="4" r="0.35" fill="#3E2723" opacity="0.2"/></pattern></defs><style>
@keyframes flow { 0% { stroke-dashoffset: 24; } 100% { stroke-dashoffset: 0; }
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); }
}
@keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; }
}
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); }
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; }
}
@keyframes dash { 0% { stroke-dashoffset: 100; } 100% { stroke-dashoffset: 0; }
}
@keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); }
}
.animate-flow { animation: flow 2s linear infinite; }
.animate-flow-reverse { animation: flow 2s linear infinite; animation-direction: reverse; }
.animate-pulse { animation: pulse 2s ease-in-out infinite; }
.animate-pulse-fast { animation: pulse 1s ease-in-out infinite; }
.animate-float { animation: float 3s ease-in-out infinite; }
.animate-blink { animation: blink 1.5s step-end infinite; }
.animate-dash { animation: dash 1.5s linear infinite; stroke-dasharray: 10 6; }
.animate-breathe { animation: breathe 4s ease-in-out infinite; }
</style><rect width="720" height="460" fill="#EDE0C8"/><rect x="18" y="18" width="684" height="424" fill="none" stroke="#3E2723" stroke-width="0.8"/><rect x="22" y="22" width="676" height="416" fill="none" stroke="#3E2723" stroke-width="0.4"/><path d="M 18 18 L 28 18 L 18 28 Z M 702 18 L 692 18 L 702 28 Z M 18 442 L 28 442 L 18 432 Z M 702 442 L 692 442 L 702 432 Z" fill="#3E2723" opacity="0.5"/><g font-family="Georgia, 'Times New Roman', serif" fill="#3E2723"><text x="360" y="54" font-size="17" font-weight="bold" text-anchor="middle" letter-spacing="1">FIG. I. — Structure of the DNA Molecule</text><text x="360" y="76" font-size="13" font-style="italic" text-anchor="middle">Double helix with complementary base pairs, engraved after nature</text></g><g fill="none" stroke-linecap="round"><line x1="170" y1="100" x2="540" y2="100" stroke="#3E2723" stroke-width="0.3" opacity="0.2"/><line x1="170" y1="400" x2="540" y2="400" stroke="#3E2723" stroke-width="0.3" opacity="0.2"/><g stroke="#3E2723"><path d="M 535 100 Q 355 115 335 140 Q 315 165 490 185" stroke-width="2.2"/><path d="M 490 185 Q 315 205 335 230 Q 355 255 535 275" stroke-width="2.2"/><path d="M 535 275 Q 355 290 335 315 Q 315 340 490 360" stroke-width="2.2"/><path d="M 490 360 Q 315 380 335 400" stroke-width="2.2"/></g><g stroke="#3E2723" opacity="0.55" stroke-width="1.2"><path d="M 190 100 Q 370 115 350 140 Q 330 165 215 185"/><path d="M 215 185 Q 330 205 350 230 Q 370 255 190 275"/><path d="M 190 275 Q 370 290 350 315 Q 330 340 215 360"/><path d="M 215 360 Q 330 380 350 400"/></g><g stroke="#3E2723" stroke-width="1.8" opacity="0.5"><path d="M 190 100 Q 355 145 335 170 Q 315 190 490 210" fill="none" stroke-width="1.2" stroke-dasharray="2 3"/><path d="M 535 100 Q 330 145 350 170 Q 370 190 215 210" fill="none" stroke-width="0.8" stroke-dasharray="2 3"/><path d="M 490 210 Q 355 245 335 270 Q 315 290 535 310" fill="none" stroke-width="1.2" stroke-dasharray="2 3"/><path d="M 215 210 Q 370 245 350 270 Q 330 290 190 31